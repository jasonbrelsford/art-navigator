version: "3.8"

services:
  graph-explorer:
    build: .
    ports:
      - "8080:8080"
    volumes:
      # Mount source files for live editing (optional — remove for production)
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./css:/usr/share/nginx/html/css:ro
      - ./js:/usr/share/nginx/html/js:ro
    restart: unless-stopped

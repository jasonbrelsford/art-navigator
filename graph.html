<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ethereal Gallery — Connection Graph</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg: #08080f;
      --text: #e0dde8;
      --dim: #6a6780;
      --gold: #c9a84c;
      --accent: #6e5fa8;
    }
    html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Raleway',sans-serif; }
    #app { width:100%; height:100%; position:relative; }
    svg { width:100%; height:100%; display:block; }

    /* Links */
    .link { stroke-opacity:0.25; fill:none; }
    .link:hover { stroke-opacity:0.7; }

    /* Nodes */
    .node { cursor:pointer; }
    .node circle { stroke-width:1.5; transition: r 0.3s; }
    .node:hover circle { filter: brightness(1.4); }
    .node text { font-size:9px; fill:var(--dim); pointer-events:none; font-family:'Raleway',sans-serif; }

    /* Tooltip */
    #tooltip {
      position:absolute; display:none; pointer-events:none;
      background:rgba(18,18,31,0.95); border:1px solid rgba(110,95,168,0.3);
      padding:12px 16px; max-width:320px; font-size:0.8rem;
      color:var(--text); line-height:1.5; z-index:100;
      box-shadow:0 4px 30px rgba(0,0,0,0.6);
    }
    #tooltip h3 { font-family:'Cormorant Garamond',serif; font-weight:400; color:var(--gold); margin-bottom:4px; font-size:1rem; }
    #tooltip .tt-type { font-size:0.7rem; color:var(--accent); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:6px; }
    #tooltip .tt-detail { color:var(--dim); font-size:0.75rem; }
    #tooltip img { width:100%; max-height:160px; object-fit:cover; margin-bottom:8px; border:1px solid rgba(110,95,168,0.2); }

    /* Legend */
    #legend {
      position:absolute; top:16px; left:16px; background:rgba(18,18,31,0.85);
      border:1px solid rgba(110,95,168,0.2); padding:14px 18px; font-size:0.75rem; z-index:10;
    }
    #legend h2 { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:1.1rem; color:var(--gold); margin-bottom:10px; letter-spacing:0.15em; }
    .legend-item { display:flex; align-items:center; gap:8px; margin-bottom:5px; cursor:pointer; opacity:0.8; transition:opacity 0.2s; }
    .legend-item:hover { opacity:1; }
    .legend-item.dimmed { opacity:0.25; }
    .legend-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }

    /* Controls */
    #controls {
      position:absolute; top:16px; right:16px; display:flex; flex-direction:column; gap:8px; z-index:10;
    }
    #controls button, #controls a {
      background:rgba(18,18,31,0.85); border:1px solid rgba(110,95,168,0.2);
      color:var(--dim); font-family:'Raleway',sans-serif; font-size:0.75rem;
      padding:8px 14px; cursor:pointer; transition:all 0.2s; text-decoration:none; text-align:center;
    }
    #controls button:hover, #controls a:hover { border-color:var(--gold); color:var(--gold); }

    /* Search */
    #search-box {
      position:absolute; bottom:16px; left:50%; transform:translateX(-50%); z-index:10;
    }
    #search-box input {
      background:rgba(18,18,31,0.9); border:1px solid rgba(110,95,168,0.3);
      color:var(--text); font-family:'Raleway',sans-serif; font-size:0.85rem;
      padding:10px 20px; width:320px; outline:none; transition:border-color 0.3s;
    }
    #search-box input:focus { border-color:var(--gold); }
    #search-box input::placeholder { color:var(--dim); }

    /* Info panel */
    #info-panel {
      position:absolute; top:0; right:-420px; width:400px; height:100%;
      background:rgba(12,12,20,0.97); border-left:1px solid rgba(110,95,168,0.2);
      padding:24px; overflow-y:auto; z-index:50; transition:right 0.4s ease;
    }
    #info-panel.open { right:0; }
    #info-panel .close-btn {
      position:absolute; top:12px; right:16px; background:none; border:none;
      color:var(--dim); font-size:1.2rem; cursor:pointer;
    }
    #info-panel .close-btn:hover { color:var(--gold); }
    #info-panel h2 { font-family:'Cormorant Garamond',serif; font-weight:400; color:var(--gold); font-size:1.5rem; margin-bottom:4px; }
    #info-panel .panel-type { font-size:0.7rem; color:var(--accent); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:12px; }
    #info-panel img { width:100%; max-height:240px; object-fit:cover; margin-bottom:12px; border:1px solid rgba(110,95,168,0.2); }
    #info-panel .panel-section { margin-bottom:16px; }
    #info-panel .panel-section h3 { font-family:'Cormorant Garamond',serif; font-weight:400; color:var(--accent); font-size:0.95rem; margin-bottom:4px; }
    #info-panel .panel-section p { font-size:0.8rem; color:var(--dim); line-height:1.6; }
    #info-panel .panel-connections { margin-top:16px; }
    #info-panel .conn-item {
      display:flex; align-items:center; gap:8px; padding:6px 0;
      border-bottom:1px solid rgba(110,95,168,0.1); cursor:pointer; transition:color 0.2s;
    }
    #info-panel .conn-item:hover { color:var(--gold); }
    #info-panel .conn-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    #info-panel .conn-label { font-size:0.75rem; color:var(--dim); }
    #info-panel .conn-rel { font-size:0.65rem; color:rgba(110,95,168,0.6); margin-left:auto; }
  </style>
</head>
<body>
  <div id="app">
    <svg id="graph"></svg>

    <div id="legend"></div>

    <div id="controls">
      <a href="index.html">← Gallery View</a>
      <button id="btn-reset">Reset View</button>
      <button id="btn-toggle-labels">Toggle Labels</button>
      <button id="btn-toggle-images">Toggle Images</button>
    </div>

    <div id="search-box">
      <input type="text" id="search-input" placeholder="Search artists, artworks, museums, locations..." aria-label="Search the graph">
    </div>

    <div id="tooltip"></div>

    <div id="info-panel">
      <button class="close-btn" aria-label="Close panel">&times;</button>
      <div id="panel-content"></div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/graph.js"></script>
</body>
</html>
